<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Page Not Found - Lim Chee Kin Portfolio</title>
  <script>
    // SPA redirect for GitHub Pages (T3 fix)
    // Converts path-based URLs to query params so the SPA can handle routing.
    // This enables future BrowserRouter migration without losing deep links.
    (function () {
      var basePath = '/portfolio';
      var path = window.location.pathname;
      // Strip the base path prefix
      var route = path.startsWith(basePath) ? path.slice(basePath.length) : path;
      if (route && route !== '/') {
        // Redirect to index with route preserved as query param + hash
        var query = route.slice(1).split('/').join('&');
        var hash = window.location.hash;
        window.location.replace(
          basePath + '/?' + query + (hash || '')
        );
      } else {
        // No route to preserve — just go to the homepage
        window.location.replace(basePath + '/' + window.location.hash);
      }
    })();
  </script>
  <style>
    body {
      font-family: 'Inter', sans-serif;
      background-color: #0a192f;
      color: #ccd6f6;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      margin: 0;
      text-align: center;
    }
    .container { max-width: 500px; padding: 2rem; }
    h1 { color: #64ffda; font-size: 4rem; margin-bottom: 0.5rem; }
    p { color: #8892b0; font-size: 1.1rem; line-height: 1.6; }
    a {
      color: #64ffda;
      text-decoration: none;
      border: 1px solid #64ffda;
      padding: 0.75rem 1.5rem;
      border-radius: 4px;
      display: inline-block;
      margin-top: 1.5rem;
      font-family: monospace;
      transition: background-color 0.2s;
    }
    a:hover { background-color: rgba(100, 255, 218, 0.1); }
  </style>
</head>
<body>
  <noscript>
    <meta http-equiv="refresh" content="0;url=/portfolio/">
  </noscript>
  <div class="container">
    <h1>404</h1>
    <p>The page you're looking for doesn't exist. Redirecting to the portfolio...</p>
    <a href="/portfolio/">Go to Portfolio</a>
  </div>
</body>
</html>

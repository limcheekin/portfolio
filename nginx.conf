server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # Trailing slash enforcement
    rewrite ^([^.]*[^/])$ $1/ permanent;

    # Sitemap compatibility — redirect /sitemap.xml to the Astro-generated sitemap index
    location = /sitemap.xml {
        return 301 /sitemap-index.xml;
    }

    # Try files, then directories, then return 404 (triggers error_page below)
    location / {
        try_files $uri $uri/ =404;
    }

    # API endpoint
    location /api/ {
        default_type application/json;
        add_header Access-Control-Allow-Origin *;
        add_header Cache-Control "public, max-age=3600, must-revalidate";
        # Rate-limit guidance for automated clients (static site; no server-side enforcement)
        add_header X-RateLimit-Limit "60";
        add_header X-RateLimit-Window "60";
        add_header X-RateLimit-Policy "60;w=60";
    }

    # Static asset caching
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # HTML pages — short cache
    location ~* \.html$ {
        expires 1h;
        add_header Cache-Control "public, must-revalidate";
    }

    # Gzip compression
    gzip on;
    gzip_vary on;
    gzip_min_length 1000;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml text/javascript image/svg+xml;

    # Security headers (applied to all responses)
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;

    # Custom 404 page
    error_page 404 /404.html;
    location = /404.html {
        internal;
    }
}
